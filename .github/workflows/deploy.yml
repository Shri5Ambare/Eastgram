name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added + github.event.commits.*.removed), 'src/') ||
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added + github.event.commits.*.removed), 'prisma/') ||
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added + github.event.commits.*.removed), 'Dockerfile') ||
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added + github.event.commits.*.removed), 'fly.toml') ||
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added + github.event.commits.*.removed), '.github/workflows/deploy.yml')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added + github.event.commits.*.removed), 'frontend/') ||
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added + github.event.commits.*.removed), '.github/workflows/deploy.yml')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (required for Flutter Android tools)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Build Flutter Web
        run: |
          cd frontend
          flutter build web --release \
            --dart-define=API_BASE_URL="${{ secrets.API_BASE_URL }}" \
            --dart-define=SOCKET_URL="${{ secrets.SOCKET_URL }}"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
